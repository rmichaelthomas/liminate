name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install ".[build]"

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile --name liminate --collect-all liminate build/entry.py

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -n 1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found in keychain" >&2
            exit 1
          fi
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Codesign binary
        run: |
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" dist/liminate
          codesign --verify --verbose dist/liminate

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          ditto -c -k dist/liminate liminate.zip
          xcrun notarytool submit liminate.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          # Note: stapling is not available for bare Mach-O binaries.
          # The notarization ticket is recorded on Apple's servers and
          # Gatekeeper resolves it online on first launch.

      - name: Rename binary
        run: mv dist/liminate dist/liminate-macos-arm64

      - uses: actions/upload-artifact@v6
        with:
          name: liminate-macos-arm64
          path: dist/liminate-macos-arm64

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install ".[build]"

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile --name liminate --collect-all liminate build/entry.py

      - name: Rename binary
        run: mv dist/liminate dist/liminate-linux-x64

      - uses: actions/upload-artifact@v6
        with:
          name: liminate-linux-x64
          path: dist/liminate-linux-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install ".[build]"

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile --name liminate --collect-all liminate build/entry.py

      - name: Rename binary
        shell: pwsh
        run: Move-Item dist/liminate.exe dist/liminate-windows-x64.exe

      - uses: actions/upload-artifact@v6
        with:
          name: liminate-windows-x64
          path: dist/liminate-windows-x64.exe

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release
          cp artifacts/liminate-macos-arm64/liminate-macos-arm64 release/
          cp artifacts/liminate-linux-x64/liminate-linux-x64 release/
          cp artifacts/liminate-windows-x64/liminate-windows-x64.exe release/
          chmod +x release/liminate-macos-arm64 release/liminate-linux-x64

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            release/liminate-macos-arm64
            release/liminate-linux-x64
            release/liminate-windows-x64.exe
